services:
  # Ollama server — runs Mistral 7B (quantized ~4 GB VRAM; full model ~8 GB)
  ollama:
    image: ollama/ollama:latest
    container_name: pramana_ollama
    mem_limit: 12g
    memswap_limit: 12g
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  # One-shot service: pulls mistral:7b after Ollama is healthy
  # Idempotent — skips download if model is already in the volume
  ollama-pull:
    image: ollama/ollama:latest
    container_name: pramana_ollama_pull
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "tinyllama"]
    restart: "no"

  # Pramana Engine Flask app
  pramana:
    build: .
    container_name: pramana_app
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "5000:5000"
    volumes:
      - vector_store:/app/vector_store_cache
    env_file:
      - .env
    environment:
      # Override Ollama host to use the Docker service name
      - OLLAMA_HOST=http://ollama:11434
    restart: unless-stopped

volumes:
  ollama_data:
  vector_store:
